services:
  postgres:
    image: postgres:17
    container_name: mercado-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - mercado_db:/var/lib/postgresql/data

volumes:
  mercado_db: